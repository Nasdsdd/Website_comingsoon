<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sigma Dynamix — Engineering alpha from volatility</title>
<meta name="description" content="Sigma Dynamix is a systematic futures trading desk. We build our own strategies and run them through a trained operator desk.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Inter:wght@300;400;500&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:      #02101F;
    --void:      #010912;
    --blue:      #0060F8;
    --off-white: #F8F8F8;
    --slate:     #6E82A0;
    --rule:      #12283F;

    --display: 'Space Grotesk', 'Segoe UI', sans-serif;
    --body:    'Inter', 'Segoe UI', sans-serif;
    --mono:    'IBM Plex Mono', ui-monospace, monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { width: 100%; min-height: 100%; }

  body {
    font-family: var(--body);
    background: var(--navy);
    color: var(--off-white);
    min-height: 100vh;
    min-height: 100dvh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    position: relative;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ---------- background layers ---------- */

  .layer { position: fixed; inset: 0; pointer-events: none; }

  .l-gradient {
    z-index: 0;
    background: radial-gradient(circle at 50% 44%,
      rgba(4,26,56,0.90) 0%,
      rgba(2,12,26,1) 52%,
      var(--void) 100%);
  }

  .l-grid {
    z-index: 1;
    background-image:
      linear-gradient(rgba(40,90,160,0.055) 1px, transparent 1px),
      linear-gradient(90deg, rgba(40,90,160,0.055) 1px, transparent 1px);
    background-size: 72px 72px;
    mask-image: radial-gradient(circle at 50% 46%, #000 0%, transparent 78%);
    -webkit-mask-image: radial-gradient(circle at 50% 46%, #000 0%, transparent 78%);
  }

  /* the tape — signature element */
  #tape {
    position: fixed;
    left: 0;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 100%;
    height: 340px;
    z-index: 2;
    pointer-events: none;
  }

  /* keeps the hero type legible over the tape */
  .l-veil {
    z-index: 3;
    background: radial-gradient(ellipse 46% 32% at 50% 47%,
      rgba(2,14,28,0.94) 0%,
      rgba(2,14,28,0.72) 45%,
      rgba(2,14,28,0) 100%);
  }

  .l-glow {
    z-index: 3;
    background: radial-gradient(circle 300px at 50% 46%,
      rgba(0,96,248,0.16) 0%,
      rgba(0,96,248,0) 70%);
  }

  /* ---------- chrome ---------- */

  header, main, footer { position: relative; z-index: 4; }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 26px 40px;
  }

  .mark { width: 22px; height: auto; display: block; opacity: 0.92; }

  nav { display: flex; align-items: center; gap: 26px; }

  a { color: inherit; }

  .nav-link {
    font-size: 13.5px;
    font-weight: 400;
    color: var(--slate);
    text-decoration: none;
    transition: color 0.18s ease;
  }
  .nav-link:hover { color: var(--off-white); }

  /* ---------- hero ---------- */

  main {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 48px 24px 64px;
  }

  .wordmark {
    height: 30px;
    width: auto;
    margin-bottom: 40px;
    opacity: 0.95;
  }

  h1 {
    font-family: var(--display);
    font-weight: 500;
    font-size: clamp(30px, 5.6vw, 62px);
    line-height: 1.04;
    letter-spacing: -0.025em;
    max-width: 15ch;
    margin-bottom: 22px;
  }

  h1 .vol {
    color: var(--blue);
    text-shadow: 0 0 32px rgba(0,96,248,0.45);
  }

  .sub {
    font-size: 15px;
    font-weight: 300;
    line-height: 1.65;
    color: var(--slate);
    max-width: 440px;
    margin-bottom: 38px;
  }

  .actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }

  .btn {
    font-family: var(--body);
    font-size: 13.5px;
    font-weight: 500;
    text-decoration: none;
    padding: 12px 24px;
    border-radius: 3px;
    transition: background 0.18s ease, border-color 0.18s ease, transform 0.18s ease;
  }

  .btn-primary {
    background: var(--blue);
    color: var(--off-white);
    box-shadow: 0 0 34px rgba(0,96,248,0.28);
  }
  .btn-primary:hover { background: #1a72ff; transform: translateY(-1px); }

  .btn-ghost {
    color: var(--off-white);
    border: 1px solid var(--rule);
  }
  .btn-ghost:hover { border-color: #23496e; transform: translateY(-1px); }

  /* ---------- footer ---------- */

  footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 24px 40px;
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #3d556f;
  }

  /* ---------- a11y ---------- */

  a:focus-visible {
    outline: 2px solid var(--blue);
    outline-offset: 3px;
    border-radius: 2px;
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
    .btn:hover { transform: none; }
  }

  /* ---------- responsive ---------- */

  @media (max-width: 640px) {
    header { padding: 20px 22px; }
    nav { gap: 18px; }
    .nav-link { font-size: 13px; }
    main { padding: 32px 22px 48px; }
    .wordmark { height: 24px; margin-bottom: 30px; }
    h1 { max-width: 12ch; margin-bottom: 18px; }
    .sub { font-size: 14px; max-width: 330px; margin-bottom: 30px; }
    .actions { flex-direction: column; width: 100%; max-width: 280px; }
    .btn { width: 100%; text-align: center; }
    #tape { height: 240px; }
    footer {
      padding: 20px 22px;
      font-size: 9px;
      letter-spacing: 0.14em;
    }
  }
</style>
</head>

    <h1>Engineering alpha from <span class="vol">volatility</span></h1>
    <p class="sub">
      A systematic futures desk. We build the strategies in-house and run them
      through a trained operator team on NQ and MNQ.

<script>
(function () {
  var cvs = document.getElementById('tape');
  if (!cvs || !cvs.getContext) return;
  var ctx = cvs.getContext('2d');

  var STEP = 3;          // px between samples
  var BASE_VOL = 0.55;   // resting volatility
  var W = 0, H = 0, dpr = 1;
  var pts = [], price = 0, vol = BASE_VOL;

  var reduced = window.matchMedia &&
                window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function gauss() {
    var u = 0, v = 0;
    while (u === 0) u = Math.random();
    while (v === 0) v = Math.random();
    return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
  }

  function step() {
    // volatility mean-reverts, with occasional bursts
    vol += (BASE_VOL - vol) * 0.006;
    if (Math.random() < 0.0045) vol += 1.5 + Math.random() * 2.2;
    price += gauss() * vol;
    price += (0 - price) * 0.004;   // drift back to the mid
    return price;
  }

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = cvs.clientWidth;
    H = cvs.clientHeight;
    cvs.width  = Math.round(W * dpr);
    cvs.height = Math.round(H * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    var n = Math.ceil(W / STEP) + 2;
    while (pts.length < n) pts.unshift(price);
    while (pts.length > n) pts.shift();
  }

  function yOf(p) {
    var amp = Math.min(H / 2 - 12, 140);
    var y = H / 2 - p * 0.95;
    return Math.max(H / 2 - amp, Math.min(H / 2 + amp, y));
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    if (pts.length < 2) return;

    var i, x;

    // faint area under the tape
    ctx.beginPath();
    ctx.moveTo(0, yOf(pts[0]));
    for (i = 1; i < pts.length; i++) ctx.lineTo(i * STEP, yOf(pts[i]));
    ctx.lineTo((pts.length - 1) * STEP, H);
    ctx.lineTo(0, H);
    ctx.closePath();
    var g = ctx.createLinearGradient(0, H / 2 - 140, 0, H);
    g.addColorStop(0, 'rgba(0,96,248,0.085)');
    g.addColorStop(1, 'rgba(0,96,248,0)');
    ctx.fillStyle = g;
    ctx.fill();

    // the line
    ctx.beginPath();
    ctx.moveTo(0, yOf(pts[0]));
    for (i = 1; i < pts.length; i++) ctx.lineTo(i * STEP, yOf(pts[i]));
    ctx.strokeStyle = 'rgba(0,96,248,0.5)';
    ctx.lineWidth = 1.25;
    ctx.lineJoin = 'round';
    ctx.shadowColor = 'rgba(0,96,248,0.55)';
    ctx.shadowBlur = 10;
    ctx.stroke();
    ctx.shadowBlur = 0;

    // live tick
    x = (pts.length - 1) * STEP;
    ctx.beginPath();
    ctx.arc(x, yOf(pts[pts.length - 1]), 2.4, 0, Math.PI * 2);
    ctx.fillStyle = '#0060F8';
    ctx.shadowColor = 'rgba(0,96,248,0.9)';
    ctx.shadowBlur = 14;
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  var last = 0;
  function loop(t) {
    if (t - last > 32) {
      last = t;
      pts.push(step());
      pts.shift();
      draw();
    }
    requestAnimationFrame(loop);
  }

  resize();
  window.addEventListener('resize', resize);

  if (reduced) {
    for (var k = 0; k < pts.length; k++) pts[k] = step();
    draw();
  } else {
    // warm the series up so it doesn't start as a flat line
    for (var j = 0; j < pts.length; j++) pts[j] = step();
    requestAnimationFrame(loop);
  }
})();
</script>
