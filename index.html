<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sigma Dynamix — Coming Soon</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: 'Poppins', 'Segoe UI', Arial, sans-serif;
    background: #02101F;
    color: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .bg-gradient {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 50% 42%, rgba(4,24,52,0.85) 0%, rgba(2,10,22,1) 55%, rgba(0,4,10,1) 100%);
    z-index: 0;
  }

  .bg-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(40,90,160,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(40,90,160,0.06) 1px, transparent 1px);
    background-size: 64px 64px;
    z-index: 1;
  }

  .glow {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 560px;
    height: 560px;
    transform: translate(-50%, -56%);
    background: radial-gradient(circle, rgba(0,96,248,0.28) 0%, rgba(0,96,248,0) 70%);
    filter: blur(10px);
    z-index: 1;
    pointer-events: none;
  }

  .content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 0 24px;
  }

  .symbol {
    width: 84px;
    height: auto;
    margin-bottom: 20px;
    filter: drop-shadow(0 0 24px rgba(0,96,248,0.35));
  }

  .wordmark {
    height: 46px;
    width: auto;
    margin-bottom: 26px;
  }

  .tagline {
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: #6e82a0;
  }

  .divider {
    width: 40px;
    height: 1px;
    background: #1c3a5e;
    margin: 24px 0;
  }

  .message {
    font-size: 15px;
    font-weight: 300;
    color: #8a9bb5;
    max-width: 420px;
    line-height: 1.6;
  }

  @media (max-width: 480px) {
    .symbol { width: 64px; margin-bottom: 16px; }
    .wordmark { height: 34px; margin-bottom: 22px; }
    .tagline { font-size: 12px; letter-spacing: 2px; }
    .message { font-size: 14px; max-width: 300px; }
  }
</style>
</head>
